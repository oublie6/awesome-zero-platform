Name: main-api
Host: 0.0.0.0
Port: 8888
HTTP:
  MaxBodyBytes: 1048576
  RequestID:
    HeaderName: X-Request-Id
    MaxLength: 64
  SecurityHeaders:
    ContentTypeOptions: nosniff
    FrameOptions: DENY
    ReferrerPolicy: no-referrer
MySQL:
  Addr: 127.0.0.1:3306
  Database: awesome_zero_platform
  User: app_local
  Password: local-dev-only-mysql-password
  Charset: utf8mb4
  ParseTime: true
  Location: UTC
  TimeZone: +00:00
  Timeout: 3s
  MaxOpenConns: 4
  MaxIdleConns: 2
  ConnMaxLifetime: 5m
  StartupTimeout: 3s
  ReadinessTimeout: 2s
Redis:
  Addr: 127.0.0.1:6379
  Password: local-dev-only-redis-password
  DB: 0
  PoolSize: 10
  DialTimeout: 3s
  ReadTimeout: 3s
  WriteTimeout: 3s
  StartupTimeout: 3s
  ReadinessTimeout: 2s
Readiness:
  Timeout: 2s
Startup:
  ConnectivityTimeout: 3s
