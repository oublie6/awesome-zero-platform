services:
  mysql:
    image: mysql:8.4.10
    environment:
      MYSQL_DATABASE: awesome_zero_platform
      MYSQL_USER: app_local
      MYSQL_PASSWORD: local-dev-only-mysql-password
      MYSQL_ROOT_PASSWORD: local-dev-only-mysql-root-password
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+00:00
      - --innodb-buffer-pool-size=64M
      - --max-connections=32
      - --performance-schema=OFF
      - --skip-log-bin
    tmpfs:
      - /var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uapp_local -plocal-dev-only-mysql-password --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  redis:
    image: redis:8.8.0-alpine3.23
    command:
      - redis-server
      - --requirepass
      - local-dev-only-redis-password
      - --save
      - ""
      - --appendonly
      - "no"
    ports:
      - "6379:6379"
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "local-dev-only-redis-password", "PING"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
