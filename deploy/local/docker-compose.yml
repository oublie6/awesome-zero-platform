services:
  postgres:
    image: postgres:18.4-bookworm
    environment:
      POSTGRES_DB: awesome_zero_platform
      POSTGRES_USER: app_local
      POSTGRES_PASSWORD: local-dev-only-postgres-password
    ports:
      - "5432:5432"
    tmpfs:
      - /var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_local -d awesome_zero_platform"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  redis:
    image: redis:8.8.0-alpine3.23
    command:
      - redis-server
      - --requirepass
      - local-dev-only-redis-password
      - --save
      - ""
      - --appendonly
      - "no"
    ports:
      - "6379:6379"
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "local-dev-only-redis-password", "PING"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
